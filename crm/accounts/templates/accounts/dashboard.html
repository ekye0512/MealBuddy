{% extends 'accounts/main.html' %} <!--tells the file where to put the html from this file in-->

{% block content %} <!-- tells django where whatever is in the black will be place within the main template-->

{% include 'accounts/status.html' %}

<h1>Dashboard</h1>
<br>
<div class = "row">
    <div class="col-md-5">
        <h5>Customers:</h5>
        <hr>
        <div class="card card-body">
            <a class="btn btn-primary btn-sm btn-block" href="">Create Customer</a>
            <table class="table table-sm">
                <tr>
                    <th></th>
                    <th>Customer</th>
                    <th>Orders</th>

                </tr>
            </table>
        </div>
    </div>
    <div class="col-md-7">
        <h5>Last 5 orders</h5>
        <hr>
        <div class="card card-body">
            <a class="btn btn-primary btn-sm btn-block" href="">Create Order</a>
            <table class="table table-sm">
                <tr>
                    <th></th>
                    <th>Product</th>
                    <th>Date Ordered</th>
                    <th>status</th>
                    <th>Update</th>
                    <th>Remove</th>
                </tr>
            </table>
        </div>
    </div>

</div>    

{% endblock %}
